name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - run: bun run build:standalone:all
            - name: Package release artifacts
              run: |
                  cd cli/dist-exe
                  mkdir -p ../release-artifacts

                  for dir in bun-*/; do
                      target="${dir%/}"
                      binary="maglev"

                      case "$target" in
                          bun-darwin-arm64) name="maglev-darwin-arm64" ;;
                          bun-darwin-x64) name="maglev-darwin-x64" ;;
                          bun-linux-arm64) name="maglev-linux-arm64" ;;
                          bun-linux-arm64-musl) name="maglev-linux-arm64-musl" ;;
                          bun-linux-x64-baseline) name="maglev-linux-x64" ;;
                          bun-linux-x64-musl-baseline) name="maglev-linux-x64-musl" ;;
                          bun-windows-x64)
                              name="maglev-win32-x64"
                              binary="maglev.exe"
                              ;;
                          *)
                              echo "Skipping unrecognized target: $target"
                              continue
                              ;;
                      esac

                      if [[ "$target" == *"windows"* ]]; then
                          zip -j "../release-artifacts/${name}.zip" "$target/$binary"
                      else
                          tar -czf "../release-artifacts/${name}.tar.gz" -C "$target" "$binary"
                      fi
                  done

                  cp ../../install-release.sh ../release-artifacts/install.sh
                  cd ../release-artifacts
                  sha256sum * > checksums.txt
            - name: Create Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${GITHUB_REF#refs/tags/}" \
                      --title "Release ${GITHUB_REF#refs/tags/}" \
                      --generate-notes \
                      cli/release-artifacts/*
            - name: Update Homebrew formula
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  VERSION="${GITHUB_REF#refs/tags/v}"
                  cd cli && bun run update-homebrew-formula --version "$VERSION" --push
